name: Scrape lunch menus

on:
  schedule:
    # Times are UTC. Lunch starts ~10:30 Helsinki (07:30 UTC in summer,
    # 08:30 UTC in winter), so the day's menu must be ready before that.
    # GitHub delays scheduled runs unpredictably — often 15-60 min, sometimes
    # hours — so we run several times each morning: the first aims to finish
    # before lunch even when delayed; the later ones retry if it was delayed,
    # failed, or the restaurant hadn't published the menu yet. Minute :23
    # avoids the heavily-contended top of the hour.
    - cron: '23 3 * * 1-5'
    - cron: '23 5 * * 1-5'
    - cron: '23 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Generous headroom: the scraper retries transient failures with backoff,
    # so a flaky site can take a while before it finally gives up.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scrape.py

      - name: Commit if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          # Ignore the generated_at timestamp line so we only commit when the
          # actual menu content changed.
          if git diff --quiet -I '"generated_at"' -- docs/data/menus.json; then
            echo "menus.json unchanged (timestamp only) — skipping commit"
            exit 0
          fi
          git add docs/data/menus.json
          git commit -m "data: update menus $(date -u +%Y-%m-%d)"
          git push
